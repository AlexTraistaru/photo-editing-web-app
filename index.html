<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aplicatie de editare foto</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="panel sidebar">
      <div>
        <h1>Editare Foto</h1>
        <p class="subtext">Incarcati o imagine sau folositi camera si spor la editat</p>
      </div>

      <div class="section">
        <h2>Imaginea dvs.</h2>
        <div class="control-group">
          <label for="imageInput" class="file-upload-btn">Incarca o imagine din calculator</label>
          <input type="file" id="imageInput" accept="image/*" />
        </div>
        <div class="button-row">
          <button id="startCameraBtn" class="primary">Foloseste camera</button>
          <button id="stopCameraBtn">Opreste camera</button>
        </div>
        <div class="button-stack" style="margin-top:10px">
          <button id="captureBtn" class="green">Captureaza poza</button>
        </div>
      </div>

      <div class="section">
        <h2>Filtre si ajustari</h2>
        <div class="control-group">
          <label for="filterSelect">Efecte de culoare</label>
          <select id="filterSelect">
            <option value="none">Fara filtru</option>
            <option value="grayscale">Grayscale</option>
            <option value="sepia">Sepia</option>
            <option value="negative">Negative</option>
            <option value="threshold">Binarizare</option>
          </select>
        </div>
        <div class="control-group">
          <label for="brightnessRange">Luminozitate</label>
          <span class="value-label" id="brightnessValue">100%</span>
          <input type="range" id="brightnessRange" min="0" max="200" value="100" />
        </div>
        <div class="control-group">
          <label for="contrastRange">Contrast</label>
          <span class="value-label" id="contrastValue">100%</span>
          <input type="range" id="contrastRange" min="0" max="200" value="100" />
        </div>
        <div class="control-group">
          <label for="saturationRange">Saturatie</label>
          <span class="value-label" id="saturationValue">100%</span>
          <input type="range" id="saturationRange" min="0" max="200" value="100" />
        </div>
      </div>

      <div class="section">
        <h2>Transformari</h2>
        <div class="button-row">
          <button id="rotateLeftBtn">Rotire stanga</button>
          <button id="rotateRightBtn">Rotire dreapta</button>
        </div>
        <div class="button-row" style="margin-top:10px">
          <button id="flipBtn">Flip orizontal</button>
          <button id="flipVerticalBtn">Flip vertical</button>
        </div>
      </div>

      <div class="section">
        <h2>Watermarking</h2>
        <div class="control-group">
          <label for="watermarkText">Text</label>
          <input type="text" id="watermarkText" placeholder="Textul watermark-ului" />
        </div>
        <div class="button-row">
          <div class="control-group" style="margin-bottom:0">
            <label for="watermarkPosition">Pozitie</label>
            <select id="watermarkPosition">
              <option value="bottom-right">Dreapta jos</option>
              <option value="bottom-left">Stanga jos</option>
              <option value="top-right">Dreapta sus</option>
              <option value="top-left">Stanga sus</option>
              <option value="center">Centru</option>
            </select>
          </div>
          <div class="control-group" style="margin-bottom:0">
            <label for="watermarkAlpha">Opacitate</label>
            <span class="value-label" id="watermarkAlphaValue">40%</span>
            <input type="range" id="watermarkAlpha" min="10" max="100" value="40" />
          </div>
        </div>
      </div>

      <div class="button-row">
        <button id="resetBtn">Reseteaza</button>
        <button id="downloadBtn" class="primary">Descarca poza</button>
      </div>

      <div id="cameraStatus" class="status info">Camera nu este pornita</div>
    </aside>

    <main class="panel main">
      <div class="preview-header">
        <div>
          <h2 style="margin-bottom:4px;font-size:20px">Zona de preview</h2>
          <p class="subtext">Aici poti observa rezultatul aplicarii editarilor asupra imaginii</p>
        </div>
        <div class="top-actions">
          <button id="showVideoBtn">Afiseaza camera</button>
          <button id="showCanvasBtn" class="primary">Afiseaza rezultat</button>
        </div>
      </div>

      <div class="preview-box">
        <video id="video" autoplay playsinline muted class="hidden"></video>
        <canvas id="canvas" width="800" height="500"></canvas>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
